const audio=document.getElementById('audio');
const fill=document.getElementById('fill');
function togglePlay(){if(audio.paused){audio.play();}else{audio.pause();}}
audio.addEventListener('timeupdate',function(){if(!audio.duration)return;fill.style.width=(audio.currentTime/audio.duration*100)+'%';});
audio.addEventListener('ended',function(){fill.style.width='0%';audio.currentTime=0;});
function seek(e){e.stopPropagation();const r=document.getElementById('track').getBoundingClientRect();const p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));audio.currentTime=p*audio.duration;}
</script>
</body>
</html>
